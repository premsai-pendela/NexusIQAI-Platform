name: Deploy Backend to ECS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-ecs-master
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nexusiq-api
  ECS_CLUSTER: nexusiq-cluster
  ECS_SERVICE: nexusiq-api-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Build, push, and roll ECS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.ECS_DEPLOY_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECS_DEPLOY_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (for cross-building ARM64 on an x86_64 runner)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        env:
          IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          LATEST_URI: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
        run: |
          docker buildx build --platform linux/arm64 -f Dockerfile.api -t "$IMAGE_URI" -t "$LATEST_URI" --load .

      - name: Push backend image
        env:
          IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          LATEST_URI: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
        run: |
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

      - name: Roll ECS service to the new image
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment

      - name: Wait for the new deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Public health check
        run: |
          curl -fsSI "https://api.nexusiq-ai.com/" || curl -fsSI "https://nexusiq-ai.com/"
