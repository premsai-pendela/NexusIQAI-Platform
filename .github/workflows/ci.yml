name: CI

# Eval gate: every push and PR must pass the full unit/contract test suite
# and the deterministic offline evals (no API keys or database required).
# A red build means an agent behavior contract regressed.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit and contract tests
        run: python -m unittest discover -s tests -v

      - name: Offline evals (validation contracts, no LLM/DB calls)
        run: python -m evals.offline_eval

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Lint web frontend
        working-directory: web
        run: npm run lint
