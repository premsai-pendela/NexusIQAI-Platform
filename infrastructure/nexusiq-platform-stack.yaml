AWSTemplateFormatVersion: '2010-09-09'
Description: >
  NexusIQ AI Platform — the AWS infrastructure this repo actually runs on:
  ECS Fargate behind an HTTPS ALB, RDS Postgres (schema-per-company), and an
  Amplify-hosted Next.js frontend. This template documents/reproduces the
  live stack built by hand via the AWS CLI during the 2026-07-08 migration
  (see ~/Dev/interview/aws_learning_notes.md for the full build log) — it is
  the reproducibility artifact, not a live overlay on top of resources that
  already exist under these same names.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC to deploy into (default VPC used in the live deployment)
    Default: vpc-0edf0684965ca8a04

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets across at least 2 AZs (ALB + Fargate tasks + RDS subnet group all use these)
    Default: "subnet-0cb18f16eb8dcc4c8,subnet-0754b8634b68d71ab,subnet-05f8dfdd591e21c2b"

  AcmCertificateArn:
    Type: String
    Description: >
      ACM certificate ARN for api.<domain> (must be requested + DNS-validated
      separately — this template does not manage domain validation since DNS
      lives outside AWS, on Cloudflare, for this project)
    Default: arn:aws:acm:us-east-1:630589800012:certificate/1a63adb2-7c27-4b65-8665-67e70c3ad846

  DbMasterUsername:
    Type: String
    Default: nexusiq_admin

  DbMasterPassword:
    Type: String
    NoEcho: true
    Description: RDS master password (never commit the real value — pass at stack-creation time)
    MinLength: 8

  GitHubRepositoryUrl:
    Type: String
    Default: https://github.com/premsai-pendela/NexusIQAI-Platform

  GitHubAccessToken:
    Type: String
    NoEcho: true
    Description: >
      Scoped GitHub token for Amplify's build access to this repo. In the
      live deployment this was granted through Amplify's GitHub App OAuth
      flow in the console (narrow, repo-scoped), not a personal access
      token pasted into a parameter — prefer that flow over this parameter
      when actually running this template; it exists here so the stack is
      syntactically complete.

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0

  ApiDomainName:
    Type: String
    Description: >
      The custom domain the ALB's HTTPS listener serves (must match the ACM
      certificate's domain — DNS CNAME to the ALB is set up manually outside
      this template, since this project's DNS lives on Cloudflare)
    Default: api.nexusiq-ai.com

Resources:

  # ────────────────────────────────────────────────────────────
  # Container registry
  # ────────────────────────────────────────────────────────────
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: nexusiq-api
      ImageScanningConfiguration:
        ScanOnPush: true

  # ────────────────────────────────────────────────────────────
  # Networking / security groups
  # ────────────────────────────────────────────────────────────
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NexusIQ API ALB public ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ApiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NexusIQ API Fargate task — only reachable from the ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NexusIQ platform RDS — only reachable from the API task
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ApiSecurityGroup

  # ────────────────────────────────────────────────────────────
  # RDS (schema-per-company Postgres)
  # ────────────────────────────────────────────────────────────
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: NexusIQ platform RDS subnet group
      SubnetIds: !Ref PublicSubnetIds

  PlatformDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: nexusiq-platform-db
      Engine: postgres
      EngineVersion: "16.4"
      DBInstanceClass: db.t3.micro
      AllocatedStorage: "20"
      StorageType: gp3
      MasterUsername: !Ref DbMasterUsername
      MasterUserPassword: !Ref DbMasterPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 1
      MultiAZ: false

  # ────────────────────────────────────────────────────────────
  # Secrets — referenced by ARN, not created here. The values already
  # live in Secrets Manager (API keys, DB URL, Langfuse creds); this
  # template consumes them, it does not own their lifecycle.
  # ────────────────────────────────────────────────────────────

  # ────────────────────────────────────────────────────────────
  # IAM
  # ────────────────────────────────────────────────────────────
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: nexusiq-ecs-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: nexusiq-secrets-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/*

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: nexusiq-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: nexusiq-bedrock-invoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:Converse
                Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}

  # ────────────────────────────────────────────────────────────
  # ECS cluster / task definition / service
  # ────────────────────────────────────────────────────────────
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: nexusiq-cluster
      CapacityProviders:
        - FARGATE

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/nexusiq-api
      RetentionInDays: 30

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: nexusiq-api
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "1024"
      Memory: "3072"
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: nexusiq-api
          Image: !Sub ${EcrRepository.RepositoryUri}:latest
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "8000"
            - Name: ENVIRONMENT
              Value: production
            - Name: LOG_LEVEL
              Value: INFO
            - Name: ALLOWED_ORIGINS
              Value: "*"
            - Name: BEDROCK_ENABLED
              Value: "true"
            - Name: BEDROCK_REGION
              Value: !Ref AWS::Region
            - Name: NEXUSIQ_LANGFUSE_ENABLED
              Value: "1"
          Secrets:
            - Name: GOOGLE_API_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/google-api-key
            - Name: GROQ_API_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/groq-api-key
            - Name: DATABASE_URL
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/database-url
            - Name: NVIDIA_API_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/nvidia-api-key
            - Name: CEREBRAS_API_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/cerebras-api-key
            - Name: LANGFUSE_PUBLIC_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/langfuse-public-key
            - Name: LANGFUSE_SECRET_KEY
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/langfuse-secret-key
            - Name: NEXUSIQ_PLATFORM_PG_URL
              ValueFrom: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:nexusiq/platform-pg-url
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # ────────────────────────────────────────────────────────────
  # Load balancer
  # ────────────────────────────────────────────────────────────
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: nexusiq-api-alb
      Type: application
      Scheme: internet-facing
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: nexusiq-api-tg
      TargetType: ip
      Protocol: HTTP
      Port: 8000
      VpcId: !Ref VpcId
      HealthCheckPath: /api/v1/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 20
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTPS
      Port: 443
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ────────────────────────────────────────────────────────────
  # ECS service
  # ────────────────────────────────────────────────────────────
  ApiService:
    Type: AWS::ECS::Service
    DependsOn: HttpsListener
    Properties:
      ServiceName: nexusiq-api-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PublicSubnetIds
          SecurityGroups:
            - !Ref ApiSecurityGroup
          AssignPublicIp: ENABLED
      LoadBalancers:
        - ContainerName: nexusiq-api
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup

  # ────────────────────────────────────────────────────────────
  # Frontend — Amplify (Next.js SSR, monorepo appRoot: web)
  # ────────────────────────────────────────────────────────────
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: NexusIQAI-Platform
      Repository: !Ref GitHubRepositoryUrl
      AccessToken: !Ref GitHubAccessToken
      EnvironmentVariables:
        - Name: NEXT_PUBLIC_API_BASE
          Value: !Sub https://${ApiDomainName}/api/v1
        - Name: AMPLIFY_MONOREPO_APP_ROOT
          Value: web
        - Name: AMPLIFY_DIFF_DEPLOY
          Value: "false"
      BuildSpec: |
        version: 1
        applications:
          - appRoot: web
            frontend:
              phases:
                preBuild:
                  commands:
                    - npm ci
                build:
                  commands:
                    - npm run build
              artifacts:
                baseDirectory: .next
                files:
                  - '**/*'
              cache:
                paths:
                  - node_modules/**/*

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: master
      EnableAutoBuild: true
      Stage: PRODUCTION

Outputs:
  AlbDnsName:
    Description: ALB DNS name — point api.<yourdomain> at this via CNAME
    Value: !GetAtt LoadBalancer.DNSName

  EcrRepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri

  DbEndpoint:
    Value: !GetAtt PlatformDatabase.Endpoint.Address

  AmplifyDefaultDomain:
    Description: >
      Amplify's own default domain for this app/branch — after deploy, point
      your real domain (root + www) at this via CNAME in your DNS provider's
      console (this project's DNS lives on Cloudflare, outside AWS, so that
      final domain step is manual, not managed by this template)
    Value: !Sub https://master.${AmplifyApp.DefaultDomain}
