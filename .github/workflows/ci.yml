name: CI

# Eval gate: every push and PR must pass the full unit/contract test suite
# and the deterministic offline evals (no API keys or database required).
# A red build means an agent behavior contract regressed.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-subtests

      - name: Verify committed brains match their source docs
        # The demo-company brains are committed (see .gitignore note). This guard
        # fails the build if a company's docs/db changed but its brain wasn't
        # rebuilt + re-committed, so the RAG-boundary tests can never pass green
        # against a stale index.
        run: python -m nexus_platform.brain_builder --check

      - name: Unit and contract tests
        # Run via pytest, not `unittest discover`: the tests/platform_mode/* suite
        # (access policy, SQL/RAG boundary, health check, repair proposer,
        # cross-company isolation) is written as pytest-style functions, which
        # `unittest discover` imports but never executes. pytest runs both the
        # unittest.TestCase suites and the function-style suites, so the whole
        # gate — including the platform-mode contracts — is actually enforced.
        run: python -m pytest -q

      - name: Offline evals (validation contracts, no LLM/DB calls)
        run: python -m evals.offline_eval

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build web frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Lint web frontend
        working-directory: web
        run: npm run lint
